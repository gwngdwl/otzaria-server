services:
  api:
    image: otzaria-server:latest
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    ports:
      - "${OTZARIA_SERVER_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      SEFORIM_DB_PATH: /data/seforim.db
    volumes:
      - type: bind
        source: ${OTZARIA_SEFORIM_DB_PATH:-/srv/otzaria/seforim.db}
        target: /data/seforim.db
        read_only: true
